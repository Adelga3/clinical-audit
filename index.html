<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة المراجعة الإكلينيكية — مجموعة المدينة الصحية</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#0a1628;--navy2:#0f2040;--blue:#1a3a6b;--accent:#00b4d8;--accent2:#0077b6;--gold:#f4a261;--green:#06d6a0;--red:#ef476f;--yellow:#ffd166;--text:#e8edf5;--muted:#7a8ba8;--card:rgba(15,32,64,0.9);--border:rgba(0,180,216,0.15);--glow:rgba(0,180,216,0.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--navy);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,180,216,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,180,216,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.header{position:sticky;top:0;z-index:100;background:rgba(10,22,40,0.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;gap:16px}
.header-brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.header-logo{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--accent2),var(--accent));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;box-shadow:0 0 20px rgba(0,180,216,0.4)}
.header-title{font-size:14px;font-weight:600}
.header-sub{font-size:10px;color:var(--muted)}
.header-nav{display:flex;gap:2px}
.nav-btn{padding:5px 14px;border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer;border:1px solid transparent;color:var(--muted);background:transparent;transition:all .2s}
.nav-btn:hover,.nav-btn.active{background:var(--glow);color:var(--accent);border-color:var(--border)}
.live-badge{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--green);font-family:'IBM Plex Mono'}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.main{padding:20px 24px;max-width:1600px;margin:0 auto;position:relative;z-index:1}
.page{display:none}.page.active{display:block}
/* FILTERS */
.filters{display:flex;gap:10px;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:20px;flex-wrap:wrap}
.filter-label{font-size:11px;color:var(--muted)}
.filter-select,.search-box{background:rgba(0,0,0,0.3);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:6px 11px;font-family:inherit;font-size:12px;cursor:pointer;outline:none;transition:border-color .2s}
.filter-select:focus,.search-box:focus{border-color:var(--accent)}
.search-box{min-width:180px}.search-box::placeholder{color:var(--muted)}
/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;position:relative;overflow:hidden;transition:transform .2s,border-color .2s;cursor:default}
.stat-card:hover{transform:translateY(-2px);border-color:var(--accent)}
.stat-icon{font-size:20px;margin-bottom:8px}
.stat-val{font-size:28px;font-weight:700;line-height:1;font-family:'IBM Plex Mono'}
.stat-label{font-size:11px;color:var(--muted);margin-top:3px}
.stat-delta{display:inline-flex;align-items:center;gap:3px;font-size:10px;margin-top:6px;padding:2px 7px;border-radius:10px;font-family:'IBM Plex Mono'}
.up{background:rgba(6,214,160,.12);color:var(--green)}.dn{background:rgba(239,71,111,.12);color:var(--red)}.nt{background:rgba(122,139,168,.12);color:var(--muted)}
/* GRID */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
.grid-21{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:16px}
/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.card-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px}
.card-badge{font-size:10px;font-family:'IBM Plex Mono';background:rgba(0,180,216,.12);color:var(--accent);border:1px solid rgba(0,180,216,.3);border-radius:4px;padding:2px 6px}
.card-body{padding:16px 18px}
/* BAR */
.bar-chart{display:flex;flex-direction:column;gap:9px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-label{font-size:11px;color:var(--muted);width:100px;text-align:right;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:7px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width .8s ease}
.bar-fill.g{background:linear-gradient(90deg,#048a6a,var(--green))}
.bar-fill.o{background:linear-gradient(90deg,#c47a3a,var(--gold))}
.bar-fill.r{background:linear-gradient(90deg,#c0294e,var(--red))}
.bar-val{font-size:11px;font-family:'IBM Plex Mono';width:55px;text-align:left;color:var(--text)}
/* KPI */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kpi-card{background:rgba(0,0,0,.2);border:1px solid var(--border);border-radius:7px;padding:12px}
.kpi-name{font-size:10px;color:var(--muted);margin-bottom:4px}
.kpi-val{font-size:22px;font-weight:700;font-family:'IBM Plex Mono'}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:2px}
.blue{color:var(--accent)}.good{color:var(--green)}.warn{color:var(--gold)}.bad{color:var(--red)}
/* TABLE */
.tbl-wrap{overflow-x:auto;max-height:460px;overflow-y:auto}
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{position:sticky;top:0;z-index:2;background:var(--navy2);color:var(--muted);padding:8px 11px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap;font-weight:500}
.tbl td{padding:8px 11px;border-bottom:1px solid rgba(255,255,255,.04);white-space:nowrap;color:var(--text)}
.tbl tr:hover td{background:rgba(0,180,216,.04)}
.tbl tr:last-child td{border-bottom:none}
.mono{font-family:'IBM Plex Mono';font-size:11px}
.code{font-family:'IBM Plex Mono';font-size:11px;color:var(--accent)}
/* BADGE */
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:500}
.bg{background:rgba(6,214,160,.12);color:var(--green)}
.br{background:rgba(239,71,111,.12);color:var(--red)}
.bm{background:rgba(122,139,168,.12);color:var(--muted)}
.bo{background:rgba(244,162,97,.12);color:var(--gold)}
.bb{background:rgba(0,180,216,.12);color:var(--accent)}
/* PROG TABS */
.prog-tabs{display:flex;gap:4px;flex-wrap:wrap;padding:10px 16px;border-bottom:1px solid var(--border)}
.prog-tab{padding:5px 13px;border-radius:6px;font-size:11px;font-family:inherit;cursor:pointer;border:1px solid transparent;color:var(--muted);background:transparent;transition:all .2s}
.prog-tab:hover{color:var(--text);border-color:var(--border)}
.prog-tab.active{background:rgba(0,180,216,.12);color:var(--accent);border-color:rgba(0,180,216,.4)}
/* SECTION TITLE */
.sec{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;margin-top:16px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}
/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.met{background:rgba(0,0,0,.2);border:1px solid var(--border);border-radius:7px;padding:12px;text-align:center}
.met-num{font-size:24px;font-weight:700;font-family:'IBM Plex Mono';color:var(--accent)}
.met-lbl{font-size:10px;color:var(--muted);margin-top:2px}
/* LOADING */
#loading{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:16px}
.spin{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
@media(max-width:900px){.stats-row{grid-template-columns:1fr 1fr}.grid-2,.grid-3,.grid-21{grid-template-columns:1fr}.metrics{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div id="loading">
  <div class="spin"></div>
  <div style="font-size:13px;color:var(--muted)">جاري تحميل البيانات...</div>
</div>

<header class="header">
  <div class="header-brand">
    <div class="header-logo">م</div>
    <div>
      <div class="header-title">منصة المراجعة الإكلينيكية</div>
      <div class="header-sub" id="hdr-sub">مجموعة المدينة الصحية</div>
    </div>
  </div>
  <nav class="header-nav">
    <button class="nav-btn active" onclick="gotoPage('overview',this)">نظرة عامة</button>
    <button class="nav-btn" onclick="gotoPage('programs',this)">البرامج</button>
    <button class="nav-btn" onclick="gotoPage('hospitals',this)">المستشفيات</button>
    <button class="nav-btn" onclick="gotoPage('data',this)">البيانات</button>
  </nav>
  <div class="live-badge"><div class="live-dot"></div><span id="hdr-date">—</span></div>
</header>

<main class="main">

<!-- ════ OVERVIEW ════ -->
<div id="page-overview" class="page active">
  <div class="filters">
    <span class="filter-label">الشهر:</span>
    <select class="filter-select" id="f-month" onchange="renderOverview()">
      <option value="Jan|2026">يناير 2026</option>
      <option value="Feb|2026">فبراير 2026</option>
      <option value="Dec|2025">ديسمبر 2025</option>
    </select>
    <span class="filter-label" style="margin-right:8px">المستشفى:</span>
    <select class="filter-select" id="f-hosp" onchange="renderOverview()">
      <option value="all">الكل</option>
    </select>
  </div>
  <div class="stats-row" id="ov-stats"></div>
  <div class="grid-21">
    <div class="card">
      <div class="card-header"><div class="card-title">🚨 الطوارئ — ED</div><div class="card-badge" id="ov-ed-badge">—</div></div>
      <div class="card-body" id="ov-ed"></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:16px">
      <div class="card">
        <div class="card-header"><div class="card-title">📋 البرامج</div></div>
        <div class="card-body" id="ov-progs" style="padding:10px 16px"></div>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title">🤱 Mcare</div></div>
        <div class="card-body" id="ov-mcare"></div>
      </div>
    </div>
  </div>
  <div class="grid-2">
    <div class="card">
      <div class="card-header"><div class="card-title">👩‍⚕️ التمريض</div></div>
      <div class="card-body" id="ov-nrs"></div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">🩺 الحمل عالي الخطورة</div></div>
      <div class="card-body" id="ov-hrp"></div>
    </div>
  </div>
</div>

<!-- ════ PROGRAMS ════ -->
<div id="page-programs" class="page">
  <div class="card" style="margin-bottom:0">
    <div class="prog-tabs" id="pg-tabs"></div>
    <div id="pg-content" style="padding:16px 18px"></div>
  </div>
</div>

<!-- ════ HOSPITALS ════ -->
<div id="page-hospitals" class="page">
  <div class="filters">
    <span class="filter-label">الشهر:</span>
    <select class="filter-select" id="h-month" onchange="renderHospitals()">
      <option value="Jan|2026">يناير 2026</option>
      <option value="Feb|2026">فبراير 2026</option>
      <option value="Dec|2025">ديسمبر 2025</option>
    </select>
    <input class="search-box" placeholder="بحث عن مستشفى..." oninput="filterHosp(this.value)">
  </div>
  <div class="card">
    <div class="tbl-wrap">
      <table class="tbl"><thead id="h-head"></thead><tbody id="h-body"></tbody></table>
    </div>
  </div>
</div>

<!-- ════ DATA ════ -->
<div id="page-data" class="page">
  <div class="filters">
    <span class="filter-label">البرنامج:</span>
    <select class="filter-select" id="dt-prog" onchange="renderData()">
      <option value="ALL">الكل</option>
      <option>AICU</option><option>CPR</option><option>CSMR</option>
      <option>ED</option><option>HRP</option><option>Mcare</option>
      <option>NICU</option><option>Nursing</option><option>PICU</option><option>VTE</option>
    </select>
    <span class="filter-label">الشهر:</span>
    <select class="filter-select" id="dt-month" onchange="renderData()">
      <option value="all">الكل</option>
      <option value="Jan|2026">يناير 2026</option>
      <option value="Feb|2026">فبراير 2026</option>
      <option value="Dec|2025">ديسمبر 2025</option>
    </select>
    <input class="search-box" placeholder="بحث..." oninput="searchDt(this.value)">
    <span style="margin-right:auto;font-size:11px;color:var(--muted)" id="dt-cnt"></span>
  </div>
  <div class="card">
    <div class="tbl-wrap">
      <table class="tbl"><thead id="dt-head"></thead><tbody id="dt-body"></tbody></table>
    </div>
  </div>
</div>

</main>

<script src="data.js"></script>
<script>
// ══════════════════════════════════════
//  GLOBALS
// ══════════════════════════════════════
const VALID_PROGS = ['AICU','CPR','CSMR','ED','HRP','Mcare','NICU','Nursing','PICU','VTE'];
const PROG_ICON  = {ED:'🚨',Mcare:'🤱',HRP:'🩺',AICU:'🫀',PICU:'👶',NICU:'🍼',Nursing:'👩‍⚕️',CPR:'❤️',CSMR:'📊',VTE:'🩸'};
const PROG_NAME  = {ED:'الطوارئ',Mcare:'رعاية الأمومة',HRP:'الحمل عالي الخطورة',AICU:'العناية المركزة',PICU:'العناية الطفلية',NICU:'حديثو الولادة',Nursing:'جودة التمريض',CPR:'الإنعاش القلبي',CSMR:'معدلات الوفيات',VTE:'الجلطات الوريدية'};
let D = {};

function init(){
  if(typeof DASHBOARD_DATA==='undefined'){
    document.getElementById('loading').innerHTML='<div style="color:var(--red);font-size:14px">⚠️ لم يتم تحميل data.js</div>';
    return;
  }
  // Load only valid programs
  VALID_PROGS.forEach(p=>{ if(DASHBOARD_DATA[p]) D[p]=DASHBOARD_DATA[p]; });
  const meta = DASHBOARD_DATA._meta||{};
  document.getElementById('hdr-sub').textContent=`مجموعة المدينة الصحية — ${meta.total_records||0} سجل`;
  document.getElementById('hdr-date').textContent=meta.generated||'';

  // Populate hospital filter
  const hosps = getHospitals();
  const sel = document.getElementById('f-hosp');
  hosps.forEach(([code,name])=>{
    const o=document.createElement('option');
    o.value=code; o.textContent=`${code} — ${name.replace(/^[^-]+-\s*/,'')}`;
    sel.appendChild(o);
  });

  document.getElementById('loading').style.display='none';
  renderOverview();
  renderProgTabs();
  renderHospitals();
  renderData();
}

function getHospitals(){
  const map={};
  VALID_PROGS.forEach(p=>{
    (D[p]||[]).forEach(r=>{
      if(r.Facility_Code&&r.Facility_Name) map[r.Facility_Code]=r.Facility_Name;
    });
  });
  return Object.entries(map).sort((a,b)=>a[0].localeCompare(b[0]));
}

function filterMonth(rows, mv){
  const [m,y] = mv.split('|');
  return rows.filter(r=>String(r.Month)===m&&String(r.Year)===y);
}

function sumField(rows,field){
  let s=0; rows.forEach(r=>{ const v=parseFloat(r[field]); if(!isNaN(v)&&v>0) s+=v; }); return Math.round(s);
}
function avg(rows,field){
  let s=0,c=0; rows.forEach(r=>{ const v=parseFloat(r[field]); if(!isNaN(v)&&v>0){s+=v;c++;} }); return c?+(s/c).toFixed(1):0;
}
function pct(n,d){ return d?Math.round(n/d*100):0; }
function fmt(n){ if(n===null||n===undefined||isNaN(n)) return '—'; return Number.isInteger(n)?n.toLocaleString('en'):(+n).toLocaleString('en'); }

// ══════════════════════════════════════
//  OVERVIEW
// ══════════════════════════════════════
function renderOverview(){
  const mv  = document.getElementById('f-month').value;
  const hf  = document.getElementById('f-hosp').value;
  const [m,y]= mv.split('|');

  function getRows(prog){
    let rows = filterMonth(D[prog]||[], mv);
    if(hf!=='all') rows=rows.filter(r=>r.Facility_Code===hf);
    return rows;
  }

  const edRows  = getRows('ED');
  const mcRows  = getRows('Mcare');
  const nrsRows = getRows('Nursing');
  const hrpRows = getRows('HRP');

  const totalED   = sumField(edRows,'ED_Total_Patients');
  const totalDel  = sumField(mcRows,'Total_Deliveries');
  const totalAdm  = sumField(nrsRows,'Total_Admissions');
  const totalHRP  = sumField(hrpRows,'Total_HighRisk_ANC');
  const hosps     = hf==='all' ? getHospitals().length : 1;

  // STATS ROW
  document.getElementById('ov-stats').innerHTML=`
    <div class="stat-card"><div class="stat-icon">🏥</div><div class="stat-val">${hosps}</div><div class="stat-label">مستشفى</div><div class="stat-delta nt">مجموعة المدينة</div></div>
    <div class="stat-card"><div class="stat-icon">🚨</div><div class="stat-val">${fmt(totalED)}</div><div class="stat-label">مرضى الطوارئ</div><div class="stat-delta nt">${m} ${y}</div></div>
    <div class="stat-card"><div class="stat-icon">🤱</div><div class="stat-val">${fmt(totalDel)}</div><div class="stat-label">إجمالي الولادات</div><div class="stat-delta nt">${m} ${y}</div></div>
    <div class="stat-card"><div class="stat-icon">👩‍⚕️</div><div class="stat-val">${fmt(totalAdm)}</div><div class="stat-label">مرضى التمريض</div><div class="stat-delta nt">${m} ${y}</div></div>
    <div class="stat-card"><div class="stat-icon">🩺</div><div class="stat-val">${fmt(totalHRP)}</div><div class="stat-label">حمل عالي الخطورة</div><div class="stat-delta nt">${m} ${y}</div></div>`;

  // ED PANEL
  const edBadge = document.getElementById('ov-ed-badge');
  edBadge.textContent = `${m} ${y} — ${edRows.length} مستشفى`;
  const totalDec  = sumField(edRows,'ED_Total_Deceased');
  const totalDis  = sumField(edRows,'ED_Discharged_Home');
  const totalWard = sumField(edRows,'ED_Ward_Admission');
  const totalDAMA = sumField(edRows,'ED_DAMA');
  const avgDoor   = avg(edRows,'ED_DoorToDoctor_avg_min');
  const treated4  = sumField(edRows,'ED_Treated_within_4hr');
  document.getElementById('ov-ed').innerHTML=`
    <div class="kpi-grid" style="margin-bottom:14px">
      <div class="kpi-card"><div class="kpi-name">إجمالي المرضى</div><div class="kpi-val blue">${fmt(totalED)}</div><div class="kpi-sub">${edRows.length} مستشفى</div></div>
      <div class="kpi-card"><div class="kpi-name">وقت الباب للطبيب (متوسط)</div><div class="kpi-val ${avgDoor<=20?'good':'warn'}">${avgDoor} <span style="font-size:12px;color:var(--muted)">دقيقة</span></div></div>
      <div class="kpi-card"><div class="kpi-name">معالجون خلال 4 ساعات</div><div class="kpi-val good">${pct(treated4,totalED)}%</div><div class="kpi-sub">${fmt(treated4)} مريض</div></div>
      <div class="kpi-card"><div class="kpi-name">وفيات</div><div class="kpi-val ${totalDec===0?'good':'bad'}">${fmt(totalDec)}</div><div class="kpi-sub">${pct(totalDec,totalED)}% من المرضى</div></div>
    </div>
    <div class="sec">توزيع المآلات</div>
    <div class="bar-chart">
      <div class="bar-row"><div class="bar-label">خروج للمنزل</div><div class="bar-track"><div class="bar-fill g" style="width:${pct(totalDis,totalED)}%"></div></div><div class="bar-val">${fmt(totalDis)}</div></div>
      <div class="bar-row"><div class="bar-label">قبول بالجناح</div><div class="bar-track"><div class="bar-fill" style="width:${Math.min(pct(totalWard,totalED)*5,100)}%"></div></div><div class="bar-val">${fmt(totalWard)}</div></div>
      <div class="bar-row"><div class="bar-label">DAMA/LAMA</div><div class="bar-track"><div class="bar-fill o" style="width:${Math.min(pct(totalDAMA,totalED)*10,100)}%"></div></div><div class="bar-val">${fmt(totalDAMA)}</div></div>
      <div class="bar-row"><div class="bar-label">وفيات</div><div class="bar-track"><div class="bar-fill r" style="width:${Math.min(pct(totalDec,totalED)*50,100)}%"></div></div><div class="bar-val">${fmt(totalDec)}</div></div>
    </div>
    <div class="sec" style="margin-top:14px">أعلى مستشفيات بعدد المرضى</div>
    <div class="bar-chart">
      ${edRows.filter(r=>r.ED_Total_Patients>0).sort((a,b)=>b.ED_Total_Patients-a.ED_Total_Patients).slice(0,6).map(r=>`
      <div class="bar-row">
        <div class="bar-label" title="${r.Facility_Name}">${r.Facility_Code}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct(r.ED_Total_Patients,edRows[0]?Math.max(...edRows.map(x=>x.ED_Total_Patients||0)):1)}%"></div></div>
        <div class="bar-val">${fmt(r.ED_Total_Patients)}</div>
      </div>`).join('')}
    </div>`;

  // MCARE
  const totDel = sumField(mcRows,'Total_Deliveries');
  const totCS  = sumField(mcRows,'CS_Delivery');
  const totSTS = sumField(mcRows,'SkinToSkin_5min_1hr');
  document.getElementById('ov-mcare').innerHTML=`
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-name">إجمالي الولادات</div><div class="kpi-val blue">${fmt(totDel)}</div></div>
      <div class="kpi-card"><div class="kpi-name">قيصرية CS</div><div class="kpi-val warn">${fmt(totCS)}</div><div class="kpi-sub">${pct(totCS,totDel)}%</div></div>
      <div class="kpi-card"><div class="kpi-name">KPI1 Skin-to-Skin</div><div class="kpi-val good">${pct(totSTS,totDel)}%</div></div>
      <div class="kpi-card"><div class="kpi-name">عدد المستشفيات</div><div class="kpi-val blue">${mcRows.length}</div></div>
    </div>`;

  // NURSING
  const totFalls = sumField(nrsRows,'Total_Patient_Falls');
  const totUlc   = sumField(nrsRows,'Total_Ulcers_excl_Stage1');
  const totDays  = sumField(nrsRows,'Total_Inpatient_Days');
  document.getElementById('ov-nrs').innerHTML=`
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-name">إجمالي المرضى</div><div class="kpi-val blue">${fmt(totalAdm)}</div></div>
      <div class="kpi-card"><div class="kpi-name">سقوط المرضى</div><div class="kpi-val ${totFalls===0?'good':'bad'}">${fmt(totFalls)}</div></div>
      <div class="kpi-card"><div class="kpi-name">أيام الرعاية</div><div class="kpi-val blue">${fmt(totDays)}</div></div>
      <div class="kpi-card"><div class="kpi-name">قرح المرحلة 2+</div><div class="kpi-val ${totUlc===0?'good':'bad'}">${fmt(totUlc)}</div></div>
    </div>`;

  // HRP
  const tot1 = sumField(hrpRows,'HighRisk_1st_trimester');
  const tot2 = sumField(hrpRows,'HighRisk_2nd_trimester');
  const tot3 = sumField(hrpRows,'HighRisk_3rd_trimester');
  document.getElementById('ov-hrp').innerHTML=`
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-name">إجمالي ANC</div><div class="kpi-val blue">${fmt(totalHRP)}</div></div>
      <div class="kpi-card"><div class="kpi-name">الثلث الأول</div><div class="kpi-val blue">${fmt(tot1)}</div></div>
      <div class="kpi-card"><div class="kpi-name">الثلث الثاني</div><div class="kpi-val warn">${fmt(tot2)}</div></div>
      <div class="kpi-card"><div class="kpi-name">الثلث الثالث</div><div class="kpi-val warn">${fmt(tot3)}</div></div>
    </div>`;

  // PROGRAMS STATUS
  document.getElementById('ov-progs').innerHTML=VALID_PROGS.map(p=>{
    const rows = filterMonth(D[p]||[], mv);
    const hasData = rows.some(r=>Object.keys(r).length>6);
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)">
      <span style="font-size:12px">${PROG_ICON[p]} ${p}</span>
      <span class="badge ${hasData?'bg':'bm'}">${hasData?rows.length+' مستشفى':'لا حالات'}</span>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════
//  PROGRAMS PAGE
// ══════════════════════════════════════
let curProg='ED';
function renderProgTabs(){
  document.getElementById('pg-tabs').innerHTML=VALID_PROGS.map((p,i)=>
    `<button class="prog-tab ${i===0?'active':''}" onclick="switchProg('${p}',this)">${PROG_ICON[p]} ${p}</button>`
  ).join('');
  renderProg();
}
function switchProg(p,btn){
  curProg=p;
  document.querySelectorAll('.prog-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderProg();
}
function renderProg(){
  const p   = curProg;
  const rows= D[p]||[];
  const el  = document.getElementById('pg-content');
  if(!rows.length){el.innerHTML=`<div style="text-align:center;padding:40px;color:var(--muted)">${PROG_ICON[p]} لا بيانات لبرنامج ${p}</div>`;return;}

  // All months comparison table
  const months = [...new Set(rows.map(r=>`${r.Month}|${r.Year}`))].sort();
  const hospitals = [...new Set(rows.map(r=>r.Facility_Code))].sort();
  const dataKeys = Object.keys(rows[0]).filter(k=>!['Facility_Name','Facility_Code','Health_Cluster','Month','Year','Source_File','Data_Collector','All_Data_Entered'].includes(k));

  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
    <div><div style="font-size:20px">${PROG_ICON[p]} ${PROG_NAME[p]}</div>
    <div style="font-size:11px;color:var(--muted);margin-top:2px">${rows.length} سجل — ${hospitals.length} مستشفى — ${months.length} شهر</div></div>
  </div>`;

  if(p==='ED'){
    // Summary per hospital per month
    html+=`<div class="sec">ملخص الطوارئ</div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr>
      <th>المستشفى</th><th>الشهر</th><th>المرضى</th><th>وقت الباب/طبيب</th><th>معالجة &lt;4hr</th><th>قبول جناح</th><th>وفيات</th><th>DAMA</th>
    </tr></thead><tbody>
    ${rows.filter(r=>r.ED_Total_Patients).sort((a,b)=>(b.ED_Total_Patients||0)-(a.ED_Total_Patients||0)).map(r=>`<tr>
      <td class="code">${r.Facility_Code}</td>
      <td><span class="badge bo">${r.Month} ${r.Year}</span></td>
      <td class="mono">${fmt(r.ED_Total_Patients)}</td>
      <td class="mono ${(r.ED_DoorToDoctor_avg_min||0)<=20?'good':'warn'}">${fmt(r.ED_DoorToDoctor_avg_min)} دق</td>
      <td class="mono good">${pct(r.ED_Treated_within_4hr,r.ED_Total_Patients)}%</td>
      <td class="mono">${fmt(r.ED_Ward_Admission)}</td>
      <td class="mono ${(r.ED_Total_Deceased||0)===0?'good':'bad'}">${fmt(r.ED_Total_Deceased)}</td>
      <td class="mono">${fmt(r.ED_DAMA)}</td>
    </tr>`).join('')}
    </tbody></table></div>`;
  } else if(p==='Mcare'){
    html+=`<div class="sec">ملخص رعاية الأمومة</div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr>
      <th>المستشفى</th><th>الشهر</th><th>الولادات</th><th>قيصرية</th><th>KPI1 STS</th><th>KPI2 رضاعة</th><th>KPI3 CS Rate</th>
    </tr></thead><tbody>
    ${rows.filter(r=>r.Total_Deliveries).map(r=>`<tr>
      <td class="code">${r.Facility_Code}</td>
      <td><span class="badge bo">${r.Month} ${r.Year}</span></td>
      <td class="mono">${fmt(r.Total_Deliveries)}</td>
      <td class="mono">${fmt(r.CS_Delivery)} (${pct(r.CS_Delivery,r.Total_Deliveries)}%)</td>
      <td class="mono ${(r.KPI1_SkinToSkin_pct||0)>=0.8?'good':'warn'}">${r.KPI1_SkinToSkin_pct!=null?Math.round(r.KPI1_SkinToSkin_pct*100)+'%':'—'}</td>
      <td class="mono">${r.KPI2_Breastfed_pct!=null?Math.round(r.KPI2_Breastfed_pct*100)+'%':'—'}</td>
      <td class="mono">${r.KPI3_CS_Rate!=null?Math.round(r.KPI3_CS_Rate*100)+'%':'—'}</td>
    </tr>`).join('')}
    </tbody></table></div>`;
  } else if(p==='Nursing'){
    html+=`<div class="sec">ملخص جودة التمريض</div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr>
      <th>المستشفى</th><th>الشهر</th><th>المرضى</th><th>أيام الرعاية</th><th>سقوط</th><th>قرح 2+</th><th>معدل السقوط</th><th>معدل القرح</th>
    </tr></thead><tbody>
    ${rows.map(r=>`<tr>
      <td class="code">${r.Facility_Code}</td>
      <td><span class="badge bo">${r.Month} ${r.Year}</span></td>
      <td class="mono">${fmt(r.Total_Admissions)}</td>
      <td class="mono">${fmt(r.Total_Inpatient_Days)}</td>
      <td class="mono ${(r.Total_Patient_Falls||0)===0?'good':'bad'}">${fmt(r.Total_Patient_Falls)}</td>
      <td class="mono ${(r.Total_Ulcers_excl_Stage1||0)===0?'good':'bad'}">${fmt(r.Total_Ulcers_excl_Stage1)}</td>
      <td class="mono">${r.KPI_PatientFall_Rate!=null?r.KPI_PatientFall_Rate:'—'}</td>
      <td class="mono">${r.KPI_PressureUlcer_Rate!=null?r.KPI_PressureUlcer_Rate:'—'}</td>
    </tr>`).join('')}
    </tbody></table></div>`;
  } else if(p==='HRP'){
    html+=`<div class="sec">ملخص الحمل عالي الخطورة</div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr>
      <th>المستشفى</th><th>الشهر</th><th>الثلث الأول</th><th>الثلث الثاني</th><th>الثلث الثالث</th><th>إجمالي ANC</th><th>KPI1</th>
    </tr></thead><tbody>
    ${rows.map(r=>`<tr>
      <td class="code">${r.Facility_Code}</td>
      <td><span class="badge bo">${r.Month} ${r.Year}</span></td>
      <td class="mono">${fmt(r.HighRisk_1st_trimester)}</td>
      <td class="mono">${fmt(r.HighRisk_2nd_trimester)}</td>
      <td class="mono">${fmt(r.HighRisk_3rd_trimester)}</td>
      <td class="mono">${fmt(r.Total_HighRisk_ANC)}</td>
      <td class="mono ${(r.KPI1_pct||0)>=0.8?'good':'warn'}">${r.KPI1_pct!=null?Math.round(r.KPI1_pct*100)+'%':'—'}</td>
    </tr>`).join('')}
    </tbody></table></div>`;
  } else {
    // Generic table for other programs
    html+=`<div class="sec">بيانات ${PROG_NAME[p]}</div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr>
      <th>المستشفى</th><th>الشهر</th>
      ${dataKeys.slice(0,10).map(k=>`<th>${k.replace(/_/g,' ')}</th>`).join('')}
    </tr></thead><tbody>
    ${rows.map(r=>`<tr>
      <td class="code">${r.Facility_Code||'—'}</td>
      <td><span class="badge bo">${r.Month||'—'} ${r.Year||''}</span></td>
      ${dataKeys.slice(0,10).map(k=>{
        const v=r[k];
        if(v===null||v===undefined) return '<td style="color:var(--muted)">—</td>';
        if(typeof v==='number'&&v<1&&v>0) return `<td class="mono">${Math.round(v*100)}%</td>`;
        return `<td class="mono">${fmt(v)}</td>`;
      }).join('')}
    </tr>`).join('')}
    </tbody></table></div>`;
  }
  el.innerHTML=html;
}

// ══════════════════════════════════════
//  HOSPITALS PAGE
// ══════════════════════════════════════
function renderHospitals(){
  const mv = document.getElementById('h-month').value;
  const hospitals = getHospitals();
  document.getElementById('h-head').innerHTML=`<tr>
    <th>الكود</th><th>المستشفى</th><th>الطوارئ</th><th>الولادات</th><th>التمريض</th><th>HRP</th><th>AICU</th><th>البرامج المُرسلة</th><th>الحالة</th>
  </tr>`;
  document.getElementById('h-body').innerHTML=hospitals.map(([code,name])=>{
    const getV=(prog,field)=>{
      const r=(filterMonth(D[prog]||[],mv)).find(x=>x.Facility_Code===code);
      return r?r[field]:null;
    };
    const edV   = getV('ED','ED_Total_Patients');
    const mcV   = getV('Mcare','Total_Deliveries');
    const nrsV  = getV('Nursing','Total_Admissions');
    const hrpV  = getV('HRP','Total_HighRisk_ANC');
    const aicuV = getV('AICU','Admissions');
    const sent  = VALID_PROGS.filter(p=>filterMonth(D[p]||[],mv).some(r=>r.Facility_Code===code));
    const complete = sent.length>=7;
    return `<tr>
      <td class="code">${code}</td>
      <td style="font-size:11px">${name.replace(/^[^-]+-\s*/,'')}</td>
      <td class="mono ${edV?'':'bm'}">${edV!=null?fmt(edV):'—'}</td>
      <td class="mono">${mcV!=null?fmt(mcV):'—'}</td>
      <td class="mono">${nrsV!=null?fmt(nrsV):'—'}</td>
      <td class="mono">${hrpV!=null?fmt(hrpV):'—'}</td>
      <td class="mono">${aicuV!=null?fmt(aicuV):'—'}</td>
      <td>${sent.map(p=>`<span class="badge bb" style="margin:1px">${p}</span>`).join('')}</td>
      <td><span class="badge ${complete?'bg':sent.length>0?'bo':'bm'}">${complete?'✓ مكتمل':sent.length>0?sent.length+'/'+VALID_PROGS.length:'لا بيانات'}</span></td>
    </tr>`;
  }).join('');
}
function filterHosp(q){
  document.querySelectorAll('#h-body tr').forEach(r=>{
    r.style.display=r.textContent.toLowerCase().includes(q.toLowerCase())?'':'none';
  });
}

// ══════════════════════════════════════
//  DATA PAGE
// ══════════════════════════════════════
function renderData(){
  const prog = document.getElementById('dt-prog').value;
  const mv   = document.getElementById('dt-month').value;
  let rows=[];
  if(prog==='ALL'){
    VALID_PROGS.forEach(p=>(D[p]||[]).forEach(r=>rows.push({Program:p,...r})));
  } else {
    rows=(D[prog]||[]).map(r=>({...r}));
  }
  if(mv!=='all'){
    const [m,y]=mv.split('|');
    rows=rows.filter(r=>String(r.Month)===m&&String(r.Year)===y);
  }
  const skip=['Source_File','Data_Collector','All_Data_Entered','Health_Cluster'];
  const keys=[...new Set(rows.flatMap(r=>Object.keys(r)))].filter(k=>!skip.includes(k));
  document.getElementById('dt-head').innerHTML='<tr>'+keys.map(k=>`<th>${k.replace(/_/g,' ')}</th>`).join('')+'</tr>';
  document.getElementById('dt-body').innerHTML=rows.map(r=>'<tr>'+keys.map(k=>{
    const v=r[k];
    if(v===null||v===undefined) return '<td style="color:var(--muted)">—</td>';
    if(k==='Program') return `<td><span class="badge bb">${v}</span></td>`;
    if(k==='Facility_Code') return `<td class="code">${v}</td>`;
    if(k==='Month'||k==='Year') return `<td><span class="badge bo">${v}</span></td>`;
    if(typeof v==='number'&&v<1&&v>0) return `<td class="mono">${Math.round(v*100)}%</td>`;
    if(typeof v==='number') return `<td class="mono">${fmt(v)}</td>`;
    return `<td style="font-size:11px">${v}</td>`;
  }).join('')+'</tr>').join('');
  document.getElementById('dt-cnt').textContent=`${rows.length} سجل`;
}
function searchDt(q){
  document.querySelectorAll('#dt-body tr').forEach(r=>{
    r.style.display=r.textContent.toLowerCase().includes(q.toLowerCase())?'':'none';
  });
}

// ══════════════════════════════════════
//  NAV
// ══════════════════════════════════════
function gotoPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

// START
window.addEventListener('load', init);
</script>
